# Label taxonomy — synced by .github/workflows/labels-sync.yml (this file is the truth).
# Four axes: type (what), priority (when), status (where in flow), ai (agent workflow).

# --- type ---
- name: "type:feature"
  color: "1d76db"
  description: "New functionality"
- name: "type:bug"
  color: "d73a4a"
  description: "Incorrect behavior"
- name: "type:refactor"
  color: "cfd3d7"
  description: "Structure change, no behavior change"
- name: "type:security"
  color: "b60205"
  description: "Security-relevant (handle per SECURITY.md)"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type:test"
  color: "bfd4f2"
  description: "Test additions/repairs"
- name: "type:dependencies"
  color: "0366d6"
  description: "Dependency updates (Renovate/Dependabot)"
- name: "type:ci"
  color: "fbca04"
  description: "CI/CD and automation"
- name: "type:adr"
  color: "5319e7"
  description: "Architecture decision"

# --- priority ---
- name: "priority:critical"
  color: "b60205"
  description: "Drop everything (outage, exploited vuln)"
- name: "priority:high"
  color: "d93f0b"
  description: "Next up"
- name: "priority:normal"
  color: "fbca04"
  description: "Default"
- name: "priority:low"
  color: "c2e0c6"
  description: "When capacity allows"

# --- status ---
- name: "status:needs-triage"
  color: "ededed"
  description: "Not yet assessed"
- name: "status:ready"
  color: "c2e0c6"
  description: "Specified and claimable by an agent"
- name: "status:in-progress"
  color: "1d76db"
  description: "Claimed — do not double-work (WF-040)"
- name: "status:blocked"
  color: "d73a4a"
  description: "Waiting on decision/dependency — reason in last comment"
- name: "status:needs-human"
  color: "5319e7"
  description: "Escalated per CLAUDE.md §13 — human decision required"

# --- ai workflow ---
- name: "ai:generated"
  color: "8250df"
  description: "Change authored by an AI agent"
- name: "ai:reviewed"
  color: "2da44e"
  description: "AI review completed (checklist attached)"
- name: "ai:good-task"
  color: "0e8a16"
  description: "Well-specified, safe for autonomous agent pickup"
